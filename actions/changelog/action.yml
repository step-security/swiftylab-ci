name: Generate changelog
description: Generate changelog for new version of Swift library
inputs:
  version:
    description: New version to release
    required: false
outputs:
  changelog:
    description: The generated changelog for the new version
    value: ${{ steps.conventional_changelog.outputs.changelog }}
  clean_changelog:
    description: The generated changelog for the new version without the version name in it
    value: ${{ steps.conventional_changelog.outputs.clean_changelog }}
  version:
    description: The new version
    value: ${{ steps.conventional_changelog.outputs.version }}
  tag:
    description: The name of the generated tag
    value: ${{ steps.conventional_changelog.outputs.tag }}
  skipped:
    description: boolean to check if this step have been skipped
    value: ${{ steps.conventional_changelog.outputs.skipped }}

runs:
  using: composite
  steps:
    - name: Subscription check
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        # validate subscription status
        UPSTREAM="SwiftyLab/ci"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
            echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
            exit 1
          fi
        fi
      shell: bash

    - name: Conventional Changelog Action
      id: conventional_changelog
      uses: step-security/conventional-changelog-action@d19f438d2b66663f5ae90d972507eecbce43d886 # v6.2.0
      with:
        github-token: ${{ github.token }}
        git-message: 'chore(CHANGELOG): update for {version}'
        git-user-name: ${{ github.actor }}
        git-user-email: security@stepsecurity.io
        release-count: 0
        version-file: './package.json'
        version-path: version
        fallback-version: '1.0.0'
        config-file-path: ${{ github.action_path }}/config.js
        pre-commit: ${{ github.action_path }}/pre_commit_hook.js
        pre-changelog-generation: ${{ github.action_path }}/pre_changelog_hook.js
      env:
        VERSION: ${{ inputs.version }}
        NODE_PATH: ${{ github.workspace }}/node_modules
